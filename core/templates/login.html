{% extends 'base.html' %}
{% block title %}Вход | Brew Salvation{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10 bg-white dark:bg-gray-900 p-6 rounded-xl shadow-md border border-gray-100 dark:border-gray-800">
    <h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-4">Вход</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="w-full bg-brand-accent text-white py-2 rounded-lg hover:bg-brand-dark transition">Войти</button>
    </form>
    <p class="mt-4 text-sm text-gray-600 dark:text-gray-400">Нет аккаунта? <a href="{% url 'register' %}" class="text-brand-accent hover:underline">Зарегистрироваться</a></p>
</div>
{% endblock %}
